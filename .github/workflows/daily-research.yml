name: Morning Research & Brief

on:
  schedule:
    # Run daily at 7 AM UTC (adjust to your timezone)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run keyword research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npx tsx scripts/research.ts

      - name: Send Slack morning brief
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: npx tsx scripts/notify.ts

      - name: Commit pending topics
        run: |
          git config user.name "SEO Bot"
          git config user.email "bot@seenbymany.com"
          git add content/pending-topics.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "research: daily topic ideas for $(date +%Y-%m-%d)"
          git push
