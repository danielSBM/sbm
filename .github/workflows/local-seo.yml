name: Local SEO — City Articles

on:
  schedule:
    # Twice daily: 8 AM and 4 PM UTC
    - cron: '0 8 * * *'   # Morning batch
    - cron: '0 16 * * *'  # Afternoon batch
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  local-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate local SEO articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NANOBANANA_API_KEY: ${{ secrets.NANOBANANA_API_KEY }}
          NANOBANANA_API_URL: ${{ secrets.NANOBANANA_API_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npx tsx scripts/generate-local.ts

      - name: Commit and push
        run: |
          git config user.name "SEO Bot"
          git config user.email "bot@seenbymany.com"
          git add content/ public/images/posts/

          if git diff --staged --quiet; then
            echo "No new content to commit"
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M)

          git commit -m "feat(local-seo): city articles — ${DATE} ${TIME}

          Automated local SEO publish by Seen By Many pipeline."
          git push
