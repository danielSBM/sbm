name: Generate & Publish Posts

on:
  workflow_dispatch:
    inputs:
      topic_ids:
        description: 'Topic IDs to publish (comma-separated, e.g., "1,3,5,7")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Longer timeout for batch generation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate approved articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NANOBANANA_API_KEY: ${{ secrets.NANOBANANA_API_KEY }}
          NANOBANANA_API_URL: ${{ secrets.NANOBANANA_API_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npx tsx scripts/generate-batch.ts ${{ inputs.topic_ids }}

      - name: Commit and push new content
        run: |
          git config user.name "SEO Bot"
          git config user.email "bot@seenbymany.com"
          git add content/ public/images/posts/

          if git diff --staged --quiet; then
            echo "No new content to commit"
            exit 0
          fi

          COUNT=$(echo "${{ inputs.topic_ids }}" | tr ',' '\n' | wc -l | tr -d ' ')
          DATE=$(date +%Y-%m-%d)

          git commit -m "feat(blog): publish ${COUNT} articles — ${DATE}

          Topics: ${{ inputs.topic_ids }}
          Automated batch publish by Seen By Many SEO pipeline."
          git push
